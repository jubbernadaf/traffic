<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VideoGuard AI - Incident Details</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #0f172a;
  color: #f8fafc;
}

.app {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 260px;
  background: #1e293b;
  display: flex;
  flex-direction: column;
  padding: 25px 0;
  border-right: 1px solid #334155;
}

.sidebar .logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 25px;
  margin-bottom: 40px;
  font-size: 22px;
  color: #60a5fa;
  font-weight: 600;
}

.sidebar .logo i {
  color: #8b5cf6;
}

.sidebar ul {
  list-style: none;
  flex: 1;
}

.sidebar li {
  padding: 14px 25px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  color: #cbd5e1;
  transition: all 0.3s;
  border-left: 3px solid transparent;
}

.sidebar li:hover {
  background: #334155;
  color: #fff;
}

.sidebar li.active {
  background: #2563eb;
  color: #fff;
  border-left-color: #60a5fa;
}

.sidebar .user-info {
  padding: 20px 25px;
  border-top: 1px solid #334155;
  margin-top: auto;
}

.sidebar .logout-btn {
  background: #dc2626;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 14px;
  margin-top: 15px;
}

.sidebar .logout-btn:hover {
  background: #b91c1c;
}

.main {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 25px;
  background: #1e293b;
  border-radius: 16px;
  margin-bottom: 25px;
}

.topbar h2 {
  color: #f1f5f9;
  font-size: 24px;
}

.tech-badge {
  display: inline-block;
  background: #8b5cf6;
  color: white;
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
}

.tech-badge i {
  margin-right: 6px;
}

.back-btn {
  background: #334155;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  transition: all 0.3s;
}

.back-btn:hover {
  background: #475569;
}

.incident-header {
  background: #1e293b;
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 25px;
  border: 1px solid #334155;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.incident-id {
  font-size: 24px;
  font-weight: 600;
  color: #8b5cf6;
}

.incident-badge {
  padding: 6px 16px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
}

.incident-badge.accident {
  background: #ef4444;
  color: white;
}

.incident-badge.jam {
  background: #f97316;
  color: white;
}

.incident-badge.warning {
  background: #f59e0b;
  color: white;
}

.yolo-badge {
  background: #8b5cf6;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-left: 10px;
}

.incident-meta {
  display: flex;
  gap: 30px;
  color: #94a3b8;
  font-size: 14px;
  flex-wrap: wrap;
}

.incident-meta i {
  margin-right: 5px;
  color: #8b5cf6;
}

.content-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 25px;
  margin-bottom: 25px;
}

.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid #334155;
}

.card-title {
  color: #8b5cf6;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.video-container {
  background: #0f172a;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}

.video-thumbnail {
  width: 100%;
  height: 300px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  cursor: pointer;
  position: relative;
}

.video-thumbnail i {
  font-size: 48px;
  color: #8b5cf6;
  transition: all 0.3s;
}

.video-thumbnail:hover i {
  transform: scale(1.1);
}

.video-thumbnail:hover .play-overlay {
  opacity: 1;
}

.play-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.3s;
}

.detection-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.detection-frame {
  height: 100px;
  background: #0f172a;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  cursor: pointer;
  border: 1px solid #334155;
  transition: all 0.3s;
}

.detection-frame:hover {
  border-color: #8b5cf6;
  color: #8b5cf6;
}

.detection-frame i {
  font-size: 24px;
  margin-bottom: 5px;
}

.detection-frame span {
  font-size: 11px;
}

.confidence-meter {
  margin-top: 15px;
}

.meter-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
  font-size: 13px;
  color: #94a3b8;
}

.meter-bar {
  height: 8px;
  background: #334155;
  border-radius: 4px;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  background: linear-gradient(90deg, #ef4444, #f97316, #8b5cf6);
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.info-item {
  background: #0f172a;
  padding: 15px;
  border-radius: 8px;
}

.info-label {
  color: #94a3b8;
  font-size: 12px;
  margin-bottom: 5px;
}

.info-value {
  color: #f1f5f9;
  font-size: 16px;
  font-weight: 600;
}

.detection-details {
  background: #0f172a;
  border-radius: 8px;
  padding: 15px;
  margin-top: 15px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #334155;
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-label {
  color: #94a3b8;
  font-size: 13px;
}

.detail-value {
  color: #8b5cf6;
  font-weight: 500;
}

.timeline {
  margin-top: 20px;
}

.timeline-item {
  padding: 15px;
  background: #0f172a;
  border-radius: 8px;
  margin-bottom: 10px;
  border-left: 4px solid #8b5cf6;
}

.timeline-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.timeline-time {
  color: #8b5cf6;
  font-size: 13px;
  font-weight: 500;
}

.timeline-user {
  color: #94a3b8;
  font-size: 12px;
}

.timeline-event {
  color: #cbd5e1;
  font-size: 14px;
}

.action-buttons {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 25px;
}

.action-btn {
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  transition: all 0.3s;
}

.action-btn.resolve {
  background: #10b981;
  color: white;
}

.action-btn.resolve:hover {
  background: #059669;
}

.action-btn.video {
  background: #8b5cf6;
  color: white;
}

.action-btn.video:hover {
  background: #7c3aed;
}

.action-btn.export {
  background: #2563eb;
  color: white;
}

.action-btn.export:hover {
  background: #1d4ed8;
}

.loading {
  text-align: center;
  padding: 60px;
  color: #94a3b8;
}

.loading i {
  font-size: 40px;
  margin-bottom: 15px;
  color: #8b5cf6;
}

.error-container {
  text-align: center;
  padding: 60px;
  color: #ef4444;
}

.error-container i {
  font-size: 48px;
  margin-bottom: 20px;
}

.alert {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 16px 24px;
  border-radius: 12px;
  color: white;
  z-index: 1000;
  display: none;
  animation: slideIn 0.3s;
}

.alert.success { background: #10b981; }
.alert.error { background: #ef4444; }
.alert.info { background: #8b5cf6; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.probability-bars {
  margin-top: 15px;
}

.prob-item {
  margin-bottom: 10px;
}

.prob-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 3px;
}

.prob-bar {
  height: 6px;
  background: #334155;
  border-radius: 3px;
  overflow: hidden;
}

.prob-fill {
  height: 100%;
}

.prob-fill.accident { background: #ef4444; }
.prob-fill.jam { background: #f97316; }
.prob-fill.warning { background: #f59e0b; }
.prob-fill.normal { background: #10b981; }
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">
    <i class="fas fa-microchip"></i>
    <span>VideoGuard AI</span>
  </div>
  <ul>
    <li onclick="location.href='/dashboard'">
      <i class="fas fa-tachometer-alt"></i>
      <span>Dashboard</span>
    </li>
    <li onclick="location.href='/incident-history'">
      <i class="fas fa-history"></i>
      <span>Incident History</span>
    </li>
    <li onclick="location.href='/analytics'">
      <i class="fas fa-chart-bar"></i>
      <span>Analytics</span>
    </li>
    <li onclick="location.href='/video-management'">
      <i class="fas fa-video"></i>
      <span>Videos</span>
    </li>
    <li onclick="location.href='/user-management'">
      <i class="fas fa-users"></i>
      <span>Users</span>
    </li>
<li onclick="location.href='/digital-twin'">
    <i class="fas fa-cube"></i>
    <span>Digital Twin</span>
</li>
    <li onclick="location.href='/settings'">
      <i class="fas fa-cog"></i>
      <span>Settings</span>
    </li>
  </ul>
  <div class="user-info">
    <div id="currentUser">Loading...</div>
    <button class="logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</aside>

<main class="main">

<div class="topbar">
  <h2>YOLOv8 Incident Details</h2>
  <div>
    <span class="tech-badge">
      <i class="fas fa-microchip"></i> YOLOv8 Analysis
    </span>
  </div>
</div>

<div id="content">
  <div class="loading">
    <i class="fas fa-microchip fa-spin"></i>
    <div>Loading YOLOv8 incident details...</div>
  </div>
</div>

</main>
</div>

<div class="alert" id="alertPanel">
  <span id="alertMessage"></span>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const incidentId = urlParams.get('id');

let currentUser = null;
let incidentData = null;
let videoData = null;

// Check authentication
async function checkAuth() {
  const userStr = localStorage.getItem('currentUser');
  if (!userStr) {
    window.location.href = '/';
    return false;
  }
  
  currentUser = JSON.parse(userStr);
  document.getElementById('currentUser').innerHTML = 
    `<strong>${currentUser.full_name || currentUser.username}</strong><br><span style="font-size: 12px; color: #94a3b8;">${currentUser.role}</span>`;
  
  return true;
}

// Load incident details
async function loadIncidentDetails() {
  if (!incidentId) {
    showError('No incident ID provided');
    return;
  }
  
  try {
    const response = await fetch(`/api/incidents/${incidentId}`);
    if (!response.ok) throw new Error('Incident not found');
    
    incidentData = await response.json();
    
    // Load associated video
    try {
      const videoResponse = await fetch(`/api/videos/${incidentData.video_id}`);
      videoData = await videoResponse.json();
    } catch (error) {
      console.error('Error loading video:', error);
    }
    
    displayIncidentDetails();
    
  } catch (error) {
    console.error('Error loading incident:', error);
    showError('Failed to load incident details');
  }
}

// Display incident details
function displayIncidentDetails() {
  const content = document.getElementById('content');
  
  const confidenceValue = parseFloat(incidentData.confidence) || 0;
  const detectionTime = new Date(incidentData.timestamp).toLocaleString();
  const videoTime = incidentData.video_time || 'N/A';
  
  // Mock detection details (in real app, these come from the analysis data)
  const detectionDetails = {
    vehicleCount: Math.floor(15 + Math.random() * 20),
    pedestrianCount: Math.floor(2 + Math.random() * 8),
    speed: Math.floor(10 + Math.random() * 30),
    yoloConfidence: confidenceValue,
    accidentProb: incidentData.type === 'accident' ? 0.87 : 0.12,
    jamProb: incidentData.type === 'jam' ? 0.83 : 0.15,
    warningProb: incidentData.type === 'warning' ? 0.78 : 0.08,
    normalProb: incidentData.type === 'normal' ? 0.91 : 0.05
  };
  
  content.innerHTML = `
    <div class="incident-header">
      <div class="header-top">
        <span class="incident-id">${incidentData.id}</span>
        <span>
          <span class="incident-badge ${incidentData.type}">${incidentData.type.toUpperCase()}</span>
          <span class="yolo-badge"><i class="fas fa-microchip"></i> YOLOv8</span>
        </span>
      </div>
      <div class="incident-meta">
        <span><i class="fas fa-calendar"></i> ${detectionTime}</span>
        <span><i class="fas fa-video"></i> ${incidentData.video_id}</span>
        <span><i class="fas fa-map-marker-alt"></i> ${incidentData.location}</span>
        <span><i class="fas fa-clock"></i> Video: ${videoTime}</span>
      </div>
    </div>

    <div class="content-grid">
      <!-- Left Column - Video & Detection -->
      <div class="card">
        <div class="card-title">
          <i class="fas fa-video"></i> Source Video
        </div>
        <div class="video-container">
          <div class="video-thumbnail" onclick="viewVideo('${incidentData.video_id}')">
            <i class="fas fa-play-circle"></i>
            <div class="play-overlay">
              <i class="fas fa-play" style="font-size: 48px;"></i>
            </div>
          </div>
        </div>
        
        <div class="card-title" style="margin-top: 25px;">
          <i class="fas fa-microchip"></i> YOLOv8 Detection Analysis
        </div>
        
        <div class="detection-details">
          <div class="detail-row">
            <span class="detail-label">Vehicles Detected:</span>
            <span class="detail-value">${detectionDetails.vehicleCount}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Pedestrians:</span>
            <span class="detail-value">${detectionDetails.pedestrianCount}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Speed at Detection:</span>
            <span class="detail-value">${detectionDetails.speed} km/h</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">YOLOv8 Confidence:</span>
            <span class="detail-value">${incidentData.confidence}</span>
          </div>
        </div>
        
        <div class="confidence-meter" style="margin-top: 20px;">
          <div class="meter-label">
            <span>Detection Confidence</span>
            <span>${incidentData.confidence}</span>
          </div>
          <div class="meter-bar">
            <div class="meter-fill" style="width: ${confidenceValue}%"></div>
          </div>
        </div>
        
        <div class="probability-bars">
          <div class="prob-item">
            <div class="prob-label">
              <span>Accident Probability</span>
              <span>${Math.round(detectionDetails.accidentProb * 100)}%</span>
            </div>
            <div class="prob-bar">
              <div class="prob-fill accident" style="width: ${detectionDetails.accidentProb * 100}%"></div>
            </div>
          </div>
          <div class="prob-item">
            <div class="prob-label">
              <span>Traffic Jam Probability</span>
              <span>${Math.round(detectionDetails.jamProb * 100)}%</span>
            </div>
            <div class="prob-bar">
              <div class="prob-fill jam" style="width: ${detectionDetails.jamProb * 100}%"></div>
            </div>
          </div>
          <div class="prob-item">
            <div class="prob-label">
              <span>Warning Probability</span>
              <span>${Math.round(detectionDetails.warningProb * 100)}%</span>
            </div>
            <div class="prob-bar">
              <div class="prob-fill warning" style="width: ${detectionDetails.warningProb * 100}%"></div>
            </div>
          </div>
          <div class="prob-item">
            <div class="prob-label">
              <span>Normal Probability</span>
              <span>${Math.round(detectionDetails.normalProb * 100)}%</span>
            </div>
            <div class="prob-bar">
              <div class="prob-fill normal" style="width: ${detectionDetails.normalProb * 100}%"></div>
            </div>
          </div>
        </div>
        
        <div class="card-title" style="margin-top: 25px;">
          <i class="fas fa-camera"></i> Detection Frames
        </div>
        <div class="detection-grid">
          <div class="detection-frame" onclick="viewFrame('before')">
            <i class="fas fa-clock"></i>
            <span>Before</span>
          </div>
          <div class="detection-frame" onclick="viewFrame('during')">
            <i class="fas fa-exclamation-triangle"></i>
            <span>During</span>
          </div>
          <div class="detection-frame" onclick="viewFrame('after')">
            <i class="fas fa-clock"></i>
            <span>After</span>
          </div>
        </div>
      </div>
      
      <!-- Right Column - Incident Info -->
      <div class="card">
        <div class="card-title">
          <i class="fas fa-info-circle"></i> Incident Information
        </div>
        
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Type</div>
            <div class="info-value">${incidentData.type.toUpperCase()}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Status</div>
            <div class="info-value" style="color: ${incidentData.status === 'resolved' ? '#10b981' : '#f59e0b'};">${incidentData.status}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Video ID</div>
            <div class="info-value">${incidentData.video_id}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Location</div>
            <div class="info-value">${incidentData.location}</div>
          </div>
          <div class="info-item">
            <div class="info-label">YOLOv8 Confidence</div>
            <div class="info-value" style="color: #8b5cf6;">${incidentData.confidence}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Video Time</div>
            <div class="info-value">${videoTime}</div>
          </div>
        </div>
        
        <div class="card-title" style="margin-top: 25px;">
          <i class="fas fa-align-left"></i> Description
        </div>
        <div style="background: #0f172a; padding: 15px; border-radius: 8px; color: #cbd5e1; line-height: 1.6;">
          ${incidentData.description}
        </div>
        
        <div class="card-title" style="margin-top: 25px;">
          <i class="fas fa-microchip"></i> YOLOv8 Model Info
        </div>
        <div style="background: #0f172a; padding: 15px; border-radius: 8px;">
          <div style="margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span style="color: #94a3b8;">Model:</span>
            <span style="color: #8b5cf6; font-weight: 600;">YOLOv8n</span>
          </div>
          <div style="margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span style="color: #94a3b8;">Inference Time:</span>
            <span>24ms</span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span style="color: #94a3b8;">Device:</span>
            <span>${navigator.gpu ? 'GPU (CUDA)' : 'CPU'}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card" style="margin-top: 25px;">
      <div class="card-title">
        <i class="fas fa-history"></i> Incident Timeline
      </div>
      <div class="timeline">
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-time">${detectionTime}</span>
            <span class="timeline-user">YOLOv8</span>
          </div>
          <div class="timeline-event">Initial detection with ${incidentData.confidence} confidence</div>
        </div>
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-time">${detectionTime}</span>
            <span class="timeline-user">Bayesian Network</span>
          </div>
          <div class="timeline-event">Incident classification: ${incidentData.type}</div>
        </div>
        <div class="timeline-item">
          <div class="timeline-header">
            <span class="timeline-time">${detectionTime}</span>
            <span class="timeline-user">System</span>
          </div>
          <div class="timeline-event">Alert generated and sent to operators</div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      ${incidentData.status !== 'resolved' ? `
        <button class="action-btn resolve" onclick="resolveIncident()">
          <i class="fas fa-check"></i> Mark Resolved
        </button>
      ` : ''}
      <button class="action-btn video" onclick="viewVideo('${incidentData.video_id}')">
        <i class="fas fa-video"></i> View Video
      </button>
      <button class="action-btn export" onclick="exportReport()">
        <i class="fas fa-download"></i> Export YOLOv8 Report
      </button>
    </div>
  `;
}

// Action functions
function viewVideo(videoId) {
  localStorage.setItem('selectedVideo', videoId);
  window.open(`/video-view?video=${videoId}`, '_blank');
}

function viewFrame(frameType) {
  showAlert(`Viewing ${frameType} YOLOv8 detection frame`, 'info');
}

async function resolveIncident() {
  try {
    const response = await fetch(`/api/incidents/${incidentId}/resolve`, {
      method: 'POST'
    });
    
    if (response.ok) {
      showAlert('Incident resolved successfully', 'success');
      setTimeout(() => location.reload(), 1500);
    }
  } catch (error) {
    showAlert('Error resolving incident', 'error');
  }
}

function exportReport() {
  // Create report data
  const report = {
    incident: incidentData,
    video: videoData,
    exportedBy: currentUser?.username,
    exportTime: new Date().toISOString(),
    yoloVersion: "YOLOv8n",
    detectionMetrics: {
      confidence: incidentData.confidence,
      timestamp: incidentData.timestamp
    }
  };
  
  // Download as JSON
  const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `yolov8-incident-${incidentId}-report.json`;
  a.click();
  
  showAlert('YOLOv8 incident report exported successfully', 'success');
}

// Show error
function showError(message) {
  document.getElementById('content').innerHTML = `
    <div class="error-container">
      <i class="fas fa-exclamation-circle"></i>
      <h3>Error</h3>
      <p style="color: #94a3b8; margin-top: 10px;">${message}</p>
      <button class="back-btn" onclick="location.href='/incident-history'" style="margin-top: 20px;">
        <i class="fas fa-arrow-left"></i> Back to History
      </button>
    </div>
  `;
}

// Show alert
function showAlert(message, type = 'success') {
  const alertPanel = document.getElementById('alertPanel');
  const alertMessage = document.getElementById('alertMessage');
  
  alertPanel.className = `alert ${type}`;
  alertMessage.textContent = message;
  alertPanel.style.display = 'block';
  
  setTimeout(() => {
    alertPanel.style.display = 'none';
  }, 3000);
}

// Logout
async function logout() {
  await fetch('/api/logout?username=' + currentUser?.username);
  localStorage.removeItem('currentUser');
  localStorage.removeItem('token');
  window.location.href = '/';
}

// Initialize
async function init() {
  const authenticated = await checkAuth();
  if (authenticated) {
    await loadIncidentDetails();
  }
}

init();
</script>
</body>
</html>
